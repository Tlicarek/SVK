<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVK - Ako superzefektívniť učenie pomocou AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .documents {
            text-align: left;
            margin-top: 30px;
        }
        
        .document-item {
            background: #f5f5f5;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        
        .document-item:hover {
            background: #efefef;
            transform: translateX(5px);
        }
        
        .document-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .document-item a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .pdf-icon {
            font-size: 20px;
        }
        
        .file-size {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 SVK</h1>
        <p class="subtitle">Ako superzefektívniť učenie pomocou AI</p>
        
        <div class="documents">
            <h2 style="text-align: center; color: #333; margin-bottom: 20px; font-size: 18px;">Dostupné dokumenty</h2>
            
            <div class="document-item">
                <a href="Metodická príručka_test.pdf" target="_blank">
                    <span class="pdf-icon">📄</span>
                    Metodická príručka_test.pdf
                </a>
                <div class="file-size">~193 KB</div>
            </div>
        </div>
        
        <footer>
            <p>Vytvorené s GitHub Pages • <a href="https://github.com/Tlicarek/SVK" style="color: #667eea; text-decoration: none;">Zobraziť na GitHub</a></p>
        </footer>
    </div>
</body>
</html>
